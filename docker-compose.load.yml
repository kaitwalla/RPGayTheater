services:
  app:
    ports: !reset []
    environment:
      APP_URL: http://rpgays.test:8000
    networks:
      default:
        aliases:
          - rpgays.test

  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  minio:
    ports: !reset []

  load:
    image: grafana/k6:0.54.0
    profiles: ["load"]
    environment:
      LOAD_BASE_URL: http://rpgays.test:8000
    volumes:
      - ./tests/load:/scripts:ro
    depends_on:
      app:
        condition: service_started
    entrypoint: ["k6", "run", "/scripts/30-participant.js"]
