name: Quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Full quality gate
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Run the repository quality gate
        run: docker compose --profile tools run --rm --build quality

  browser:
    name: Browser and accessibility gates
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Run browser and passkey coverage
        run: ./scripts/run-browser-gates.sh

  recovery:
    name: Backup and restore rehearsal
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Exercise isolated database and object-storage recovery
        run: ./scripts/rehearse-backup-restore.sh

  resilience:
    name: Service-interruption resilience rehearsal
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Exercise isolated dependency interruptions and recovery
        run: ./scripts/rehearse-service-interruptions.sh
