name: rpgays

services:
  app:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment: &app_environment
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY:-base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      APP_URL: http://localhost:8000
      LOG_CHANNEL: json
      CONTROL_SECRET: ${CONTROL_SECRET:-local-development-secret-change-before-production}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: rpgays
      DB_USERNAME: rpgays
      DB_PASSWORD: rpgays
      PGCONNECT_TIMEOUT: 3
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: database
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: rpgays
      REVERB_APP_KEY: rpgays-local-key
      REVERB_APP_SECRET: rpgays-local-secret-change-before-production
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      REVERB_ALLOWED_ORIGINS: http://localhost:8000
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: rpgays
      AWS_ENDPOINT: http://minio:9000
      ASSET_PUBLIC_S3_ENDPOINT: http://localhost:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    command: php artisan queue:work redis --queue=realtime,default --sleep=1 --tries=3 --max-time=3600
    environment: *app_environment
    depends_on:
      app:
        condition: service_started

  scheduler:
    build:
      context: ./backend
    command: php artisan schedule:work
    environment: *app_environment
    depends_on:
      app:
        condition: service_started

  reverb:
    build:
      context: ./backend
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    environment: *app_environment
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy

  quality:
    build:
      context: ./backend
      target: quality
    profiles: ["tools"]
    environment:
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

  browser:
    build:
      context: ./backend
      target: browser
    platform: linux/amd64
    profiles: ["browser"]
    environment:
      CI: "true"
      PLAYWRIGHT_BASE_URL: http://rpgays.test:8000
    depends_on:
      app:
        condition: service_started
    entrypoint:
      - bash
      - -lc
      - until curl --fail --silent http://app:8000/control > /dev/null; do sleep 1; done; npx playwright test --project=chromium --project=firefox --project=webkit --project=mobile-chromium --project=mobile-webkit

  browser-passkey:
    build:
      context: ./backend
      target: browser
    platform: linux/amd64
    profiles: ["browser"]
    environment:
      CI: "true"
      PLAYWRIGHT_BASE_URL: http://localhost:8000
    depends_on:
      app-passkey:
        condition: service_started
    network_mode: service:app-passkey
    entrypoint:
      - bash
      - -lc
      - until curl --fail --silent http://localhost:8000/control > /dev/null; do sleep 1; done; npx playwright test --project=chromium-passkey

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: rpgays
      POSTGRES_USER: rpgays
      POSTGRES_PASSWORD: rpgays
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpgays -d rpgays"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: http://localhost:8000,http://rpgays.test:8000
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:9000/minio/health/live > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/rpgays"

volumes:
  minio-data:
  postgres-data:
  redis-data:
