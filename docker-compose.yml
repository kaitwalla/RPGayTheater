name: rpgays

services:
  app:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment: &app_environment
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      CONTROL_SECRET: ${CONTROL_SECRET:-local-development-secret-change-before-production}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: rpgays
      DB_USERNAME: rpgays
      DB_PASSWORD: rpgays
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: database
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: rpgays
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    command: php artisan queue:work redis --sleep=1 --tries=3 --max-time=3600
    environment: *app_environment
    depends_on:
      app:
        condition: service_started

  scheduler:
    build:
      context: ./backend
    command: php artisan schedule:work
    environment: *app_environment
    depends_on:
      app:
        condition: service_started

  quality:
    build:
      context: ./backend
      target: quality
    profiles: ["tools"]
    environment:
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: rpgays
      POSTGRES_USER: rpgays
      POSTGRES_PASSWORD: rpgays
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpgays -d rpgays"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-bootstrap:
    image: minio/mc:latest
    volumes:
      - ./docker/minio-cors.json:/config/minio-cors.json:ro
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/rpgays &&
      mc cors set local/rpgays /config/minio-cors.json"

volumes:
  minio-data:
  postgres-data:
  redis-data:
